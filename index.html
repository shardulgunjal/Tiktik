<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tiktik — Dynamic Island-style toast notification library demo">
  <title>Tiktik — Dynamic Island Toast Library</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 0%, #888888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 40px;
      letter-spacing: 0.02em;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 12px;
      margin-top: 32px;
      width: 100%;
      max-width: 700px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      width: 100%;
      max-width: 700px;
    }

    button {
      padding: 12px 16px;
      border: 1px solid #222;
      border-radius: 12px;
      background: #111;
      color: #ccc;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 150ms ease;
      font-family: inherit;
    }

    button:hover {
      background: #1a1a1a;
      border-color: #333;
      color: #fff;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn--success { border-color: #22c55e33; color: #22c55e; }
    .btn--success:hover { background: #22c55e11; border-color: #22c55e55; }
    .btn--error { border-color: #ef444433; color: #ef4444; }
    .btn--error:hover { background: #ef444411; border-color: #ef444455; }
    .btn--warning { border-color: #f59e0b33; color: #f59e0b; }
    .btn--warning:hover { background: #f59e0b11; border-color: #f59e0b55; }
    .btn--info { border-color: #3b82f633; color: #3b82f6; }
    .btn--info:hover { background: #3b82f611; border-color: #3b82f655; }

    /* --- Live Counter --- */
    .counter {
      margin-top: 32px;
      padding: 16px 24px;
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 14px;
      color: #888;
      width: 100%;
      max-width: 700px;
      text-align: center;
    }

    .counter span {
      color: #fff;
      font-weight: 600;
    }

    /* --- Live Editor --- */
    .editor {
      margin-top: 32px;
      width: 100%;
      max-width: 700px;
    }

    .editor textarea {
      width: 100%;
      min-height: 120px;
      padding: 16px;
      border: 1px solid #222;
      border-radius: 12px;
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 150ms ease;
    }

    .editor textarea:focus {
      border-color: #333;
    }

    .editor-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btn--run {
      background: #1a1a2e;
      border-color: #3b82f644;
      color: #3b82f6;
      flex: 1;
    }

    .btn--run:hover {
      background: #3b82f622;
      border-color: #3b82f6;
    }

    /* --- Footer --- */
    .footer {
      margin-top: 48px;
      color: #333;
      font-size: 12px;
    }

    .footer a {
      color: #555;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>Tiktik</h1>
  <p class="subtitle">Dynamic Island–style toast notifications</p>

  <!-- Basic Types -->
  <div class="section-title">Toast Types</div>
  <div class="button-grid">
    <button class="btn--success" id="btn-success">✓ Success</button>
    <button class="btn--error" id="btn-error">✕ Error</button>
    <button class="btn--warning" id="btn-warning">⚠ Warning</button>
    <button class="btn--info" id="btn-info">ℹ Info</button>
  </div>

  <!-- Promise -->
  <div class="section-title">Promise API</div>
  <div class="button-grid">
    <button id="btn-promise-resolve">Promise (resolve 2s)</button>
    <button id="btn-promise-reject">Promise (reject 1.5s)</button>
  </div>

  <!-- Stacking & Queue -->
  <div class="section-title">Stacking & Queue</div>
  <div class="button-grid">
    <button id="btn-stack5">Stack 5 (100ms delay)</button>
    <button id="btn-queue-overflow">Queue Overflow (8 rapid)</button>
  </div>

  <!-- Features -->
  <div class="section-title">Features</div>
  <div class="button-grid">
    <button id="btn-custom-icon">Custom SVG Icon</button>
    <button id="btn-long-message">Long Message</button>
    <button id="btn-bottom">Bottom Position</button>
    <button id="btn-dedup">Deduplication (×3)</button>
    <button id="btn-progress">Progress Bar (5s)</button>
    <button id="btn-action">With Action</button>
    <button id="btn-rtl">RTL Mode Toggle</button>
  </div>

  <!-- Live Counter -->
  <div class="counter">
    Visible: <span id="count-visible">0</span> / Queued: <span id="count-queued">0</span>
  </div>

  <!-- Live Editor -->
  <div class="editor">
    <div class="section-title">Live Editor</div>
    <textarea id="editor-code">Tiktik.showToast({
  message: 'Hello from the editor!',
  type: 'success',
  duration: 3000,
  progress: true
})</textarea>
    <div class="editor-actions">
      <button class="btn--run" id="btn-run">▶ Run</button>
    </div>
  </div>

  <div class="footer">
    <p>Tiktik v0.1.0 — Zero dependencies, ~7KB gzipped</p>
  </div>

  <script type="module">
    import { Tiktik } from './src/index.ts';

    // Expose globally for editor eval and console testing
    window.Tiktik = Tiktik;

    // --- Live Counter ---
    const countVisible = document.getElementById('count-visible');
    const countQueued = document.getElementById('count-queued');
    Tiktik.onStackChange((visible, queued) => {
      countVisible.textContent = visible;
      countQueued.textContent = queued;
    });

    // --- Success ---
    document.getElementById('btn-success').addEventListener('click', () => {
      Tiktik.success('Changes saved successfully!');
    });

    // --- Error ---
    document.getElementById('btn-error').addEventListener('click', () => {
      Tiktik.error('Failed to save changes.');
    });

    // --- Warning ---
    document.getElementById('btn-warning').addEventListener('click', () => {
      Tiktik.warning('Your session will expire in 5 minutes.');
    });

    // --- Info ---
    document.getElementById('btn-info').addEventListener('click', () => {
      Tiktik.info('New update available.');
    });

    // --- Promise Resolve ---
    document.getElementById('btn-promise-resolve').addEventListener('click', () => {
      const fakeResolve = new Promise((resolve) => {
        setTimeout(() => resolve({ name: 'Profile' }), 2000);
      });
      Tiktik.promise(fakeResolve, {
        loading: 'Saving profile...',
        success: (data) => `Saved! ${data.name}`,
        error: (err) => `Failed: ${err}`,
      });
    });

    // --- Promise Reject ---
    document.getElementById('btn-promise-reject').addEventListener('click', () => {
      const fakeReject = new Promise((_, reject) => {
        setTimeout(() => reject(new Error('Network error')), 1500);
      });
      Tiktik.promise(fakeReject, {
        loading: 'Uploading file...',
        success: () => 'Uploaded!',
        error: (err) => `Failed: ${err instanceof Error ? err.message : err}`,
      });
    });

    // --- Stack 5 ---
    document.getElementById('btn-stack5').addEventListener('click', () => {
      const types = ['success', 'error', 'info', 'warning', 'success'];
      types.forEach((type, i) => {
        setTimeout(() => {
          Tiktik.showToast({
            message: `Toast #${i + 1} (${type})`,
            type: type,
          });
        }, i * 100);
      });
    });

    // --- Queue Overflow ---
    document.getElementById('btn-queue-overflow').addEventListener('click', () => {
      for (let i = 0; i < 8; i++) {
        Tiktik.info(`Queued toast #${i + 1}`);
      }
    });

    // --- Custom SVG Icon ---
    document.getElementById('btn-custom-icon').addEventListener('click', () => {
      const starSVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
      Tiktik.showToast({
        message: 'Custom star icon!',
        type: 'warning',
        icon: starSVG,
      });
    });

    // --- Long Message ---
    document.getElementById('btn-long-message').addEventListener('click', () => {
      Tiktik.info(
        'This is a very long notification message that tests how the Dynamic Island morphs and expands to accommodate longer text content gracefully.'
      );
    });

    // --- Bottom Position ---
    document.getElementById('btn-bottom').addEventListener('click', () => {
      Tiktik.success('Toast at the bottom!', { position: 'bottom' });
    });

    // --- Deduplication ---
    document.getElementById('btn-dedup').addEventListener('click', () => {
      const dedupId = 'dedup-test';
      Tiktik.showToast({ message: 'Update 1 of 3', type: 'info', id: dedupId });
      setTimeout(() => {
        Tiktik.showToast({ message: 'Update 2 of 3', type: 'warning', id: dedupId });
      }, 500);
      setTimeout(() => {
        Tiktik.showToast({ message: 'Update 3 of 3 — Final!', type: 'success', id: dedupId });
      }, 1000);
    });

    // --- Progress Bar ---
    document.getElementById('btn-progress').addEventListener('click', () => {
      Tiktik.success('Uploading... this will take 5 seconds.', {
        progress: true,
        duration: 5000,
      });
    });

    // --- With Action ---
    document.getElementById('btn-action').addEventListener('click', () => {
      Tiktik.info('Click this notification!', {
        onClick: () => alert('Action clicked!'),
        duration: 5000,
      });
    });

    // --- RTL Toggle ---
    let isRTL = false;
    document.getElementById('btn-rtl').addEventListener('click', () => {
      isRTL = !isRTL;
      document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
      Tiktik.info(isRTL ? 'RTL mode enabled — مرحبا!' : 'LTR mode restored');
    });

    // --- Live Editor ---
    document.getElementById('btn-run').addEventListener('click', () => {
      const code = document.getElementById('editor-code').value;
      try {
        // Use Function constructor to eval with Tiktik in scope
        new Function('Tiktik', code)(Tiktik);
      } catch (err) {
        Tiktik.error(`Editor error: ${err instanceof Error ? err.message : err}`);
      }
    });
  </script>
</body>
</html>
